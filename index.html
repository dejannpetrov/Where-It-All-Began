<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Our Moment</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;

  overflow:hidden;

  background:#000;

  font-family:Arial,sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* BUTTON */

.watch-btn{
  padding:16px 34px;

  border:none;

  border-radius:999px;

  background:rgba(255,255,255,0.12);

  color:white;

  font-size:16px;

  letter-spacing:0.5px;

  backdrop-filter:blur(10px);

  -webkit-backdrop-filter:blur(10px);

  cursor:pointer;

  transition:0.3s ease;
}

.watch-btn:active{
  transform:scale(0.97);
}

/* OVERLAY */

.video-overlay{
  position:fixed;

  inset:0;

  background:rgba(0,0,0,0.92);

  display:flex;

  justify-content:center;

  align-items:center;

  opacity:0;

  pointer-events:none;

  transition:opacity 0.45s ease;
}

/* OPEN */

.video-overlay.active{
  opacity:1;

  pointer-events:auto;
}

/* VIDEO HOLDER */

.video-modal{

  width:90vw;

  height:90vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:24px;
}

/* VIDEO */

.video-modal video{

  width:100%;

  max-width:430px;

  aspect-ratio:16/9;

  object-fit:cover;

  border-radius:24px;

  background:black;

  box-shadow:
  0 25px 80px rgba(0,0,0,0.65);

  transform:scale(0.985);

  opacity:0;

  transition:
  opacity 0.45s ease,
  transform 0.45s ease;
}

/* SHOW VIDEO */

.video-overlay.active video{
  opacity:1;

  transform:scale(1);
}

/* REMOVE IOS VIDEO UI */

video::-webkit-media-controls{
  display:none !important;
}

</style>
</head>

<body>

<button class="watch-btn" onclick="openVideo()">
  Watch Our Moment
</button>

<div class="video-overlay" id="videoOverlay">

  <div class="video-modal" onclick="event.stopPropagation()">

    <video
      id="proposalVideo"
      playsinline
      preload="auto">

      <source src="zoomnpin.mp4" type="video/mp4">

    </video>

  </div>

</div>

<script>

const overlay = document.getElementById("videoOverlay");
const video = document.getElementById("proposalVideo");

function openVideo(){

  overlay.classList.add("active");

  video.currentTime = 0;

  video.muted = false;
  video.volume = 1;

  video.play().catch(() => {});

}

/* CLOSE WHEN CLICK OUTSIDE */

overlay.addEventListener("click", () => {

  overlay.classList.remove("active");

  video.pause();

  video.currentTime = 0;

});

</script>

</body>
</html>
