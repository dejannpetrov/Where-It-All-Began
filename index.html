<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Beginning</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

body {
    background: black;
    overflow: hidden;
}

/* VIDEO */
#videoContainer {
    position: fixed;
    inset: 0;
    z-index: 1;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.4) blur(6px);
    transform: scale(1.05);
    transition: 1.5s ease;
}

/* PARTICLES */
canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
}

/* UI */
.container {
    position: relative;
    z-index: 3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    transition: opacity 0.6s ease;
}

h1 {
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 30px;
    font-size: clamp(20px, 5vw, 28px);
}

/* BUTTON */
button {
    padding: 16px 40px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 15px;
}

/* QUOTE */
#quote {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(18px, 5vw, 28px);
    color: white;
    opacity: 0;
    z-index: 4;
    white-space: nowrap;
    transition: opacity 1s ease;
}

/* FINAL */
#final {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 22px;
    opacity: 0;
    z-index: 10;
    transition: opacity 1.5s ease;
}
</style>
</head>

<body>

<div id="videoContainer">
    <video id="video" src="zoom1.mp4" playsinline preload="auto"></video>
</div>

<canvas id="particles"></canvas>

<div class="container">
    <h1>A Place Worth Remembering</h1>
    <button onclick="start()">Begin</button>
</div>

<div id="quote">Where it Began...</div>
<div id="final">Everything began here...</div>

<script>

/* SIMPLE PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

let p = [];
for(let i=0;i<50;i++){
    p.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        d:Math.random()*0.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    ctx.globalAlpha=0.4;

    p.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
        s.y+=s.d;
        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });
}
setInterval(draw,33);

/* MAIN FIXED FLOW */
function start(){

    const container = document.querySelector(".container");
    const video = document.getElementById("video");
    const quote = document.getElementById("quote");
    const final = document.getElementById("final");

    container.style.opacity = "0";

    // IMPORTANT: play must happen IMMEDIATELY on click
    video.muted = true;
    video.currentTime = 0;

    let playPromise = video.play();

    if(playPromise !== undefined){
        playPromise.catch(err=>{
            console.log("Play blocked:", err);
        });
    }

    // quote
    setTimeout(()=>{
        quote.style.opacity = "1";
    },300);

    // clear video
    setTimeout(()=>{
        quote.style.opacity = "0";
        video.style.filter = "brightness(1) blur(0px)";
        video.style.transform = "scale(1)";
    },1800);

    // end screen
    video.addEventListener("timeupdate",()=>{
        if(video.duration && video.currentTime > video.duration - 0.5){
            final.style.opacity = "1";
            video.style.opacity = "0";
        }
    });

}

window.addEventListener("resize",resize);

</script>

</body>
</html>
