<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #070a12;
  color: white;
}

/* PARTICLES FULL SCREEN */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* INTRO SCREEN */
#intro {
  position: absolute;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  backdrop-filter: blur(6px);
  transition: opacity 1.5s ease;
  padding: 20px;
}

h1 {
  font-weight: 300;
  font-size: 26px;
  letter-spacing: 1px;
  opacity: 0.95;
  margin-bottom: 30px;
}

button {
  padding: 14px 28px;
  border-radius: 40px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

button:hover {
  transform: scale(1.05);
}

/* VIDEO LAYER */
#videoContainer {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 80%;
  height: 45%;
  transform: translate(-50%, -50%) scale(0.85);
  opacity: 0;
  z-index: 1;
  transition: all 2s ease-in-out;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 18px;
  filter: blur(6px) brightness(0.75);
  transition: filter 2s ease;
}

#videoContainer.active {
  width: 100%;
  height: 100%;
  border-radius: 0;
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

#videoContainer.active video {
  filter: blur(0px) brightness(1);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- INTRO -->
<div id="intro">
  <h1>The Place Worth Remembering</h1>
  <button onclick="startVideo()">Relieve the Moment</button>
</div>

<!-- VIDEO -->
<div id="videoContainer">
  <video id="bgVideo" src="zoomnpin.mp4" playsinline></video>
</div>

<script>
// VIDEO START
function startVideo() {
  document.getElementById("intro").style.opacity = "0";

  const videoContainer = document.getElementById("videoContainer");
  const video = document.getElementById("bgVideo");

  setTimeout(() => {
    videoContainer.classList.add("active");
    video.play();
  }, 800);
}

// PARTICLES (FULL SCREEN FLOAT)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 90; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random() * 1.2
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(255,255,255,0.55)";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    p.y -= p.d;

    if (p.y < 0) {
      p.y = canvas.height;
      p.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawParticles);
}

drawParticles();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
